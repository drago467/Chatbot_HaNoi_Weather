services:
  postgres:
    image: postgres:16
    container_name: hanoiweather_postgres
    environment:
      POSTGRES_DB: chatbothanoiair
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hanoiair2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chatbothanoiair"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: hanoiweather_api
    command: ./entrypoint_api.sh
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-hanoiair2024}@postgres:5432/chatbothanoiair
      API_BASE: ${API_BASE}
      API_KEY: ${API_KEY}
      MODEL: ${MODEL:-gpt-4o-2024-11-20}
      AGENT_API_BASE: ${AGENT_API_BASE:-}
      AGENT_API_KEY: ${AGENT_API_KEY:-}
      AGENT_MODEL: ${AGENT_MODEL:-}
      OPENWEATHER_API_KEY_0: ${OPENWEATHER_API_KEY_0:-}
      OPENWEATHER_API_KEY_1: ${OPENWEATHER_API_KEY_1:-}
      OPENWEATHER_API_KEY_2: ${OPENWEATHER_API_KEY_2:-}
      OPENWEATHER_API_KEY_3: ${OPENWEATHER_API_KEY_3:-}
      OPENWEATHER_API_KEY_4: ${OPENWEATHER_API_KEY_4:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-hanoi-weather-router}
      USE_SLM_ROUTER: ${USE_SLM_ROUTER:-false}
      SLM_CONFIDENCE_THRESHOLD: ${SLM_CONFIDENCE_THRESHOLD:-0.75}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-random-secret-string}
      # LangSmith observability (optional)
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-false}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY:-}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT:-hanoi-weather-chatbot}
      LANGCHAIN_ENDPOINT: ${LANGCHAIN_ENDPOINT:-https://api.smith.langchain.com}
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts
      - ./logs:/app/logs
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  streamlit:
    build: .
    container_name: hanoiweather_streamlit
    command: ./entrypoint_streamlit.sh
    ports:
      - "8501:8501"
    environment:
      API_URL: http://api:8000
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-hanoiair2024}@postgres:5432/chatbothanoiair
      HOME: /tmp
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./app:/app/app
      - ./app.py:/app/app.py
      - ./logs:/app/logs
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
